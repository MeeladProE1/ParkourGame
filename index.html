<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="utf-8">
    <title>Parkour Game</title>
    <style>
        body { margin: 0; overflow: hidden; }
        #gameOverScreen {
            display: none;
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            background: rgba(0, 0, 0, 0.8);
            color: white;
            padding: 20px;
            border-radius: 10px;
            text-align: center;
        }

         #responsivePrompt {
            display: none;
            position: fixed;
            bottom: 20px;
            right: 20px;
            background: rgba(0, 0, 0, 0.7);
            color: white;
            padding: 10px 15px;
            border-radius: 8px;
            text-align: center;
            /* Key: Ensure it doesn't take focus */
            user-select: none;
            pointer-events: auto; 
            z-index: 1000;
        }
        #responsivePrompt button {
            margin: 5px;
            padding: 5px 10px;
            cursor: pointer;
        }

        #mobileControls {
            display: none;
            position: fixed;
            bottom: 0;
            width: 100%;
            height: 100px;
            background: rgba(0, 0, 0, 0.5);
            padding: 10px;
            box-sizing: border-box;
            z-index: 999;
            display: flex;
            justify-content: space-around;
            align-items: center;
        }
        .control-btn {
            padding: 10px 15px;
            font-size: 16px;
            opacity: 0.9;
        }
    </style>
</head>
<body>
    <div id="gameOverScreen">
        <h1>Game Over</h1>
        <button id="tryAgainButton">Try Again</button>
    </div>
    
    <div id="responsivePrompt" style="display: none;">
        <p id="promptMessage"></p>
        <button id="confirmControlsButton">Yes</button>
        <button id="denyControlsButton">No</button>
    </div>

    <div id="mobileControls" style="display: none;">
        <button id="jumpButton" class="control-btn">Jump</button>
        <button id="forwardButton" class="control-btn">Forward</button>
        <button id="leftButton" class="control-btn">Left</button>
        <button id="rightButton" class="control-btn">Right</button>
        <button id="rotateLeftButton" class="control-btn">Rotate Left</button>
        <button id="rotateRightButton" class="control-btn">Rotate Right</button>
    </div>

    <script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
    <script src="script.js"></script>
</body>
</html>
